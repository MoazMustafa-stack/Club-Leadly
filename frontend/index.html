<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Club Leadly</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Club Leadly</h1>
    <div id="user-info" class="hidden">
      <span id="user-email"></span>
      <span id="user-role" class="badge"></span>
      <button id="btn-logout">Logout</button>
    </div>
  </header>

  <main>
    <!-- AUTH SECTION -->
    <section id="auth-section">
      <div class="card">
        <h2>Register</h2>
        <form id="register-form">
          <input type="text" id="reg-name" placeholder="Full Name" required />
          <input type="email" id="reg-email" placeholder="Email" required />
          <input type="password" id="reg-password" placeholder="Password (min 8)" required minlength="8" />
          <button type="submit">Register</button>
        </form>
      </div>
      <div class="card">
        <h2>Login</h2>
        <form id="login-form">
          <input type="email" id="login-email" placeholder="Email" required />
          <input type="password" id="login-password" placeholder="Password" required />
          <button type="submit">Login</button>
        </form>
      </div>
    </section>

    <!-- CLUB SECTION (shown after login, before joining/creating club) -->
    <section id="club-setup-section" class="hidden">
      <div class="card">
        <h2>Create a Club</h2>
        <form id="create-club-form">
          <input type="text" id="club-name" placeholder="Club Name" required minlength="2" />
          <button type="submit">Create Club</button>
        </form>
      </div>
      <div class="card">
        <h2>Join a Club</h2>
        <form id="join-club-form">
          <input type="text" id="join-code" placeholder="6-char Join Code" required maxlength="6" minlength="6" />
          <button type="submit">Join Club</button>
        </form>
      </div>
    </section>

    <!-- DASHBOARD (shown when user is in a club) -->
    <section id="dashboard-section" class="hidden">
      <nav class="tab-bar">
        <button class="tab active" data-tab="club-tab">Club</button>
        <button class="tab" data-tab="tasks-tab">Tasks</button>
        <button class="tab" data-tab="points-tab">Points</button>
        <button class="tab" data-tab="leaderboard-tab">Leaderboard</button>
      </nav>

      <!-- Club Tab -->
      <div id="club-tab" class="tab-content active">
        <div class="card">
          <h2>Club Details</h2>
          <div id="club-details"></div>
        </div>
        <div class="card">
          <h2>Members</h2>
          <table id="members-table">
            <thead><tr><th>Name</th><th>Role</th><th>Points</th><th>Joined</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <!-- Tasks Tab -->
      <div id="tasks-tab" class="tab-content hidden">
        <!-- Create task form (organiser only) -->
        <div id="create-task-section" class="card hidden">
          <h2>Create Task</h2>
          <form id="create-task-form">
            <input type="text" id="task-title" placeholder="Title" required minlength="2" />
            <textarea id="task-description" placeholder="Description (optional)"></textarea>
            <input type="number" id="task-points" placeholder="Points" value="10" min="1" />
            <select id="task-assignee"><option value="">Unassigned</option></select>
            <input type="datetime-local" id="task-due" />
            <button type="submit">Create Task</button>
          </form>
        </div>
        <div class="card">
          <h2>Task List</h2>
          <div id="tasks-list"></div>
        </div>
        <!-- Task Detail Modal -->
        <div id="task-modal" class="modal hidden">
          <div class="modal-content">
            <button class="modal-close">&times;</button>
            <div id="task-detail"></div>
          </div>
        </div>
      </div>

      <!-- Points Tab -->
      <div id="points-tab" class="tab-content hidden">
        <!-- Award points form (organiser only) -->
        <div id="award-points-section" class="card hidden">
          <h2>Award / Deduct Points</h2>
          <form id="award-points-form">
            <select id="points-user"><option value="">Select Member</option></select>
            <input type="number" id="points-delta" placeholder="Points (+/-)" required />
            <input type="text" id="points-reason" placeholder="Reason (min 3 chars)" required minlength="3" />
            <button type="submit">Award Points</button>
          </form>
        </div>
        <div class="card">
          <h2>Point History</h2>
          <table id="points-table">
            <thead><tr><th>Date</th><th>Delta</th><th>Reason</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <!-- Leaderboard Tab -->
      <div id="leaderboard-tab" class="tab-content hidden">
        <div class="card">
          <h2>Leaderboard</h2>
          <table id="leaderboard-table">
            <thead><tr><th>#</th><th>Name</th><th>Points</th><th>Tasks Done</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <div id="toast" class="hidden"></div>

  <script src="app.js"></script>
</body>
</html>
